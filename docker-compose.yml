services:
  workshop:
    build:
      context: .
      dockerfile: server/Dockerfile
    privileged: true
    ports:
      - "7424:7424"
      - "48100-48119:48100-48119"  # Range for MCP bridge SSE endpoints
      - "49200-49300:49200-49300"  # Range for proxied container ports
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSHOP_PORT=7424
      - WORKSHOP_DB_PATH=/data/workshop.db
    volumes:
      - docker-data:/var/lib/docker
      - workshop-data:/data
      - ./craftsmen:/craftsmen
      - ~/.claude.json:/host-claude-config/claude.json:ro
      - ~/.mcp-auth:/home/node/.mcp-auth:ro
    restart: unless-stopped

volumes:
  docker-data:
  workshop-data:
