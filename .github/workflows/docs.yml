name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main, dev/docs]
    paths:
      - 'documentation/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build docs
        run: npx github:givecampus/doc-explorer create --output docsite --docs-path documentation

      - name: Add .nojekyll
        run: touch docsite/.nojekyll

      - name: Add 404.html for SPA routing
        run: cp docsite/index.html docsite/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docsite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
